services:
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile.dev
    environment:
      PORT: 3001
      DB_PATH: /data/anc.db
    volumes:
      # Bind source for hot reload, but keep node_modules from the image.
      - ./apps/server/src:/repo/apps/server/src
      - ./packages/shared/src:/repo/packages/shared/src
      - ./data:/data
    ports:
      - "3001:3001"

  client:
    build:
      context: .
      dockerfile: apps/client/Dockerfile.dev
    environment:
      VITE_API_TARGET: http://server:3001
      VITE_USE_POLLING: "1"
    volumes:
      - ./apps/client/src:/repo/apps/client/src
      - ./apps/client/public:/repo/apps/client/public
      - ./apps/client/index.html:/repo/apps/client/index.html
      - ./apps/client/vite.config.ts:/repo/apps/client/vite.config.ts
      - ./packages/shared/src:/repo/packages/shared/src
    ports:
      - "5173:5173"
    depends_on:
      - server

  db-viewer:
    # Lightweight web UI for browsing the SQLite DB at http://localhost:8081.
    # The --read-only flag enforces no writes at the application layer.
    # The mount is RW (not :ro) because SQLite needs to manage WAL/shm files
    # even when opened read-only — a read-only mount triggers
    # "unable to open database file" with the server's WAL-mode DB.
    image: coleifer/sqlite-web:latest
    command: sqlite_web -H 0.0.0.0 -p 8080 -x --read-only /data/anc.db
    volumes:
      - ./data:/data
    ports:
      - "8081:8080"
    depends_on:
      - server
